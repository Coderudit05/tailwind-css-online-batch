<!doctype html>
<html lang="en">
  <head>

    <link rel="stylesheet" href="output.css" />
    <script
      src="https://kit.fontawesome.com/f12c1313f0.js"

    ></script>

  <body>
    <div class="h-screen bg-indigo-300 flex items-center justify-center">
      <div class="w-70 border bg-[#0F172A] rounded-2xl px-4 py-6">
        <h3 class="text-[#808BF7]">Most Popular</h3>
        <h2 class="text-white text-3xl font-medium">Pro Plan</h2>
        <h1 class="text-white text-4xl font-bold">
          ₹999 <span class="text-lg text-gray-400">/month</span>
        </h1>

        <p class="text-gray-400 py-2">
          Everything you need to grow your business.
        </p>

        <div class="h-0.5 w-full bg-gray-400 mt-3"></div>

        <ul class="text-white/50 flex flex-col gap-1 mt-2">
          <li>
            <i class="fa-solid fa-check text-[#808BF7]"></i> Unlimited Projects
          </li>
          <li><i class="fa-solid fa-check text-[#808BF7]"></i> 50GB Storage</li>
          <li>
            <i class="fa-solid fa-check text-[#808BF7]"></i> Priority Support
          </li>
          <li>
            <i class="fa-solid fa-check text-[#808BF7]"></i> Custom Domain
          </li>
          <li class="line-through">
            <i class="fa-solid fa-xmark text-red-500"></i> White Label
          </li>
        </ul>

        <div class="text-center py-4">
          <button
            class="bg-[#808BF7] text-white px-4 py-2 rounded-2xl cursor-pointer"
          >
            Get Started
          </button>
        </div>

        <div class=""></div>
      </div>
    </div>
