<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bongo IT</title>
    <link rel="stylesheet" href="output.css" />

    <!-- Font Awesome -->
    <script
      src="https://kit.fontawesome.com/f12c1313f0.js"
      crossorigin="anonymous"
    ></script>
    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="font-[Inter] text-gray-900 bg-blue-950">
    <!-- NAVBAR -->
    <nav class="border border-gray-500/20 h-16 bg-white">
      <div
        class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between"
      >
        <!-- Logo  -->
        <h1
          class="text-xl font-bold text-blue-600 flex items-center gap-2 cursor-pointer"
        >
          <svg
            class="w-10 h-10 text-white bg-blue-600 rounded-lg hover:-rotate-10 duration-300"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13 10V3L4 14h7v7l9-11h-7z"
            ></path>
          </svg>
          Bongo IT
        </h1>

        <!-- Desktop Menu -->
        <div class="hidden md:flex items-center justify-center space-x-6">
          <a href="#" class="hover:text-blue-600 duration-300 ease-in-out"
            >Home</a
          >
          <a href="#" class="hover:text-blue-600">Services</a>
          <a href="#" class="hover:text-blue-600">About</a>
          <a href="#" class="hover:text-blue-600">Features</a>
          <a href="#" class="hover:text-blue-600">Testimonials</a>

          <button
            class="bg-blue-600 text-white px-4 py-2 rounded-lg cursor-pointer hover:shadow-2xl hover:shadow-blue-600 duration-300 hover:scale-105"
          >
            Get Started
          </button>
        </div>

        <!-- Mobile Menu Button -->
        <div class="flex md:hidden">
          <i class="fa-solid fa-bars"></i>
        </div>
      </div>
    </nav>

    <!-- HERO -->
    <section
      class="relative max-w-7xl min-h-[calc(100vh-64px)] mx-auto flex items-center px-4"
    >
      <div class="grid lg:grid-cols-2 gap-10 w-full h-[70vh]">
        <!-- Left Content -->
        <div class="flex flex-col items-start gap-6">
          <div
            class="flex items-center justify-center gap-2 bg-blue-50 w-fit px-4 py-2 rounded-full mx-auto lg:mx-0"
          >
            <span class="h-3 w-3 bg-green-400 rounded-full"></span>
            <span>Empowering Digital Transformation</span>
          </div>

          <h1
            class="text-5xl lg:text-6xl xl:text-7xl font-black text-white text-center lg:text-start max-w-3xl mx-auto"
          >
            We Build <span class="gradient-text">Digital</span> Experiences That
            <span class="gradient-text">Matter</span>
          </h1>
          <p
            class="text-base sm:text-xl text-gray-400 mx-auto text-center lg:text-left max-w-3xl"
          >
            Bongo IT delivers cutting-edge software solutions, cloud
            infrastructure, and AI-powered products that drive growth for
            businesses worldwide.
          </p>

          <div class="flex flex-col sm:flex-row items-center mx-auto gap-4">
            <button class="bg-blue-600 px-6 py-4 rounded-full cursor-pointer text-white flex items-center gap-2 w-">
              Start Your Project <i class="fa-solid fa-arrow-right"></i>
            </button>
            <button class="bg-gray-800 border border-gray-700 px-6 py-4 rounded-full cursor-pointer text-white flex items-center gap-2 w-">
              <i class="fa-solid fa-circle-play"></i> Watch Demo
            </button>
          </div>
        </div>

        <!-- Right Content -->

        <div class=""></div>
      </div>
    </section>

    <!-- SERVICES -->
    <section></section>

    <!-- ABOUT -->
    <section></section>

    <!-- FEATURES -->
    <section></section>

    <!-- TESTIMONIALS -->
    <section></section>

    <!-- CONTACT -->
    <section></section>

    <!-- FOOTER -->
    <footer></footer>
  </body>
</html>
