<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }


        header {
            display: flex;
            justify-content: space-between;

            padding: 10px 40px;
            background-color: beige;
            align-items: center;

            position: fixed;
            width: 100%;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        nav a {

            text-decoration: none;
        }

        .nav-btns {
            display: flex;
            gap: 20px;
        }

        #section1{
            height: 100vh;
        }
        #section2{
            height: 100vh;
        }
        #section3{
            height: 100vh;
        }
        #section4{
            height: 100vh;
        }
        #section5{
            height: 100vh;
        }
    </style>
</head>

<body>

    <header>
        <h1>MyGallery</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Work</a>
            <a href="#">Testimonials</a>
        </nav>

        <div class="nav-btns">
            <div class="button">Login</div>
            <div class="button">Signup</div>
        </div>
    </header>

    <section id="section1"></section>
    <section id="section2"></section>
    <section id="section3"></section>
    <section id="section4"></section>
    <section id="section5"></section>

</body>

</html>
