<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Relative</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        .parent{
            height: 500px;
            width: 400px;
            background-color: yellowgreen;

            margin-left: 500px;
            margin-top: 200px;

            position: relative;
        }

        .child{
            height: 200px;
            width: 200px;
            background-color: red;

            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>

<body>

    <div class="parent">
        <div class="child"></div>
    </div>

</body>

</html>
