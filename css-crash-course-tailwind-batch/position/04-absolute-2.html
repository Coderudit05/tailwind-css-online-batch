<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,body{
            height: 100%;
            width: 100%;
        }
        
        .box1{
            height: 200px;
            width: 200px;
            background-color: yellowgreen;
        }
        .box2{
            height: 200px;
            width: 200px;
            background-color: rgb(178, 206, 211);

            position: absolute;

            /* top: 0; */
            right: 0;
            bottom: 0;
        }
        .box3{
            height: 200px;
            width: 200px;
            background-color: rgb(198, 118, 98);

            top: 0;
            right: 0;
        }






    </style>
</head>
<body>
    
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
</body>
</html>
