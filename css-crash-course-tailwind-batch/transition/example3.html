<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button{
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            position: relative;
            z-index: 1;
            overflow: hidden;
            transition: all 0.3s;
        }

        button::after{
            content: '';
            height: 100%;
            width: 0%;
            background-color: violet;

            position: absolute;

            top: 0;
            left: 0;
            z-index: -1;

            transition: width 0.3s;
        }

        button:hover{
            color: white;
        }

        button:hover::after{
            width: 100%;

        }


    </style>
</head>

<body>

    <button>Hover Me</button>

</body>

</html>
