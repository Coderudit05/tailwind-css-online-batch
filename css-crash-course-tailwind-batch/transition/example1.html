<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            /* background: linear-gradient(to right, rgb(236, 72, 153), rgb(239, 68, 68), rgb(234, 179, 8)); */
            cursor: pointer;
            background-color: blueviolet;
            color: white;
            border-radius: 20px;

            /* transition: all 0.3s; */

            transition-property: all;
            transition-duration: 0.4s;

        }

        button:hover {
            /* background: linear-gradient(to right, rgb(219, 234, 254), rgb(147, 197, 253), rgb(59, 130, 246)); */
            background-color: yellowgreen;
        }
    </style>
</head>

<body>

    <button>Hover Me</button>

</body>

</html>
