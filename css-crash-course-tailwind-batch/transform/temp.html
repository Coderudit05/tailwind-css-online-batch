<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html,body{
            height: 100%;
            width: 100%;
        }

        body{
            padding: 1px;
        }

        #box1{
            height: 200px;
            width: 200px;
            background-color: aquamarine;
            transform: translateY(500px);
        }
        #box2{
            height: 200px;
            width: 200px;
            background-color: rgb(186, 61, 165);
        }
        #box3{
            height: 200px;
            width: 200px;
            background-color: rgb(195, 156, 65);
        }
        #box4{
            height: 200px;
            width: 200px;
            background-color: rgb(51, 40, 199);
        }

    </style>
</head>
<body>

    <div id="box1"></div>
    <div id="box2"></div>
    <div id="box3"></div>
    <div id="box4"></div>
    
</body>
</html>
