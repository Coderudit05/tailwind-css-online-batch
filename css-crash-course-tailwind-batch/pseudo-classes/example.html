<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        button {}

        #btn1:hover {
            border: none;
            outline: none;

            background-color: brown;
            color: white;
            cursor: pointer;
        }

        #btn2:active {
            background-color: aquamarine;
        }

        input {
            border: none;
        }

        input:focus {
            outline: none;
        }

        #link2:visited{
            color: green;
        }

        
    </style>
</head>

<body>

    <button id="btn1">Hover Me</button>

    <button id="btn2">Click me</button>

    <br><br>

    <input type="text" placeholder="Enter Your Name">

    <br><br>

    <a href="https://www.google.com/">Go to my website</a>
    <a id="link2" href="#">Click me</a>



</body>
</html>
