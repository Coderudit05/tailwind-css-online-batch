<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
        }


        body{
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button{
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(to right, rgb(236, 72, 153), rgb(239, 68, 68), rgb(234, 179, 8));
            cursor: pointer;
            color: white;
            font-size: 20px;
        }

        .btn1:hover{
            background: linear-gradient(to right, rgb(249, 168, 212), rgb(216, 180, 254), rgb(129, 140, 248));
        }


        .btn2:active{
            background-color: aqua;
        }

       
    </style>
</head>

<body>

    <button class="btn1">Hover Me</button>

    <button class="btn2">Click me</button>


   

</body>

</html>
